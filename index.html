<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <title>LJC Namensschild Generator</title>
    <style>
        /* [CSS bleibt gleich wie zuvor] */
        * {

            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            min-height: 100vh;
            background: linear-gradient(
                to right,
                #9d0000 0%,
                #9d0000 39.5%,
                #b13333 39.5%,
                #b13333 40.5%,
                #9d0000 40.5%,
                #9d0000 44.5%,
                #b13333 44.5%,
                #b13333 45.5%,
                #9d0000 45.5%,
                #9d0000 49.5%,
                #b13333 49.5%,
                #b13333 50.5%,
                #9d0000 50.5%,
                #9d0000 54.5%,
                #b13333 54.5%,
                #b13333 55.5%,
                #9d0000 55.5%,
                #9d0000 59.5%,
                #b13333 59.5%,
                #b13333 60.5%,
                #9d0000 60.5%
            );
            overflow-y: auto;
        }

        .container {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            padding: 2rem;
            align-items: start;
            max-width: 1200px;
            margin: 0 auto;
        }

        .content-box {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 2rem;
            backdrop-filter: blur(10px);
            animation: slideIn 0.5s ease-out;
        }

        .preview-box {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 2rem;
            backdrop-filter: blur(10px);
            animation: slideIn 0.5s ease-out 0.1s both;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .preview-label {
            color: #9d0000;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        #previewCanvas {
            border: 2px solid #b13333;
            border-radius: 8px;
            background: white;
            max-width: 100%;
            height: auto;
        }

        h1 {
            color: #9d0000;
            font-size: 2rem;
            margin-bottom: 0.5rem;
            text-align: center;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        h2 {
            color: #9d0000;
            font-size: 1.2rem;
            margin-bottom: 1rem;
            text-align: center;
            font-weight: 700;
        }

        .description {
            color: #555;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 1.5rem;
            line-height: 1.6;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #b13333;
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
            background: #fff;
        }

        input[type="text"]:focus,
        input[type="email"]:focus {
            outline: none;
            border-color: #9d0000;
            box-shadow: 0 0 0 3px rgba(157, 0, 0, 0.1);
            background: #fafafa;
        }

        input[type="text"]::placeholder,
        input[type="email"]::placeholder {
            color: #aaa;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-row .form-group {
            margin-bottom: 0;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .content-box,
            .preview-box {
                padding: 1.5rem;
            }

            .form-row {
                grid-template-columns: 1fr;
                gap: 0.5rem;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 0.75rem;
                grid-template-columns: 1fr;
            }

            .content-box,
            .preview-box {
                padding: 1rem;
            }

            input[type="text"],
            input[type="email"] {
                padding: 0.65rem 0.85rem;
                font-size: 16px;
            }
        }

        /* Export-Buttons */
        .export-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            width: 100%;
            grid-column: 1 / -1;
            justify-content: center;
        }

        .btn-export {
            padding: 0.85rem 1.5rem;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #9d0000;
            color: white;
            box-shadow: 0 4px 12px rgba(157, 0, 0, 0.3);
        }

        .btn-export:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(157, 0, 0, 0.4);
        }

        .btn-export:active {
            transform: translateY(0);
        }

        @media (max-width: 1024px) {
            .export-buttons {
                grid-column: 1 / -1;
            }
        }

        @media (max-width: 480px) {
            .export-buttons {
                flex-direction: column;
                gap: 0.5rem;
            }

            .btn-export {
                padding: 0.75rem 1.25rem;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Formular-Seite -->
        <div class="content-box">
            <h1>LJC-Namensschild</h1>

            <p class="description">
                Erstelle dein eigenenes Landesjugendchor Namensschild für deine Notenmappe
            </p>

            <form id="nametagForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">Vorname</label>
                        <input 
                            type="text" 
                            id="firstName" 
                            name="firstName" 
                            placeholder="Max"
                            maxlength="50"
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label for="lastName">Nachname</label>
                        <input 
                            type="text" 
                            id="lastName" 
                            name="lastName" 
                            placeholder="Mustermann"
                            maxlength="50"
                            required
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="phoneNumber">Rufnummer</label>
                    <input 
                        type="text" 
                        id="phoneNumber" 
                        name="phoneNumber" 
                        placeholder="z.B. +49 123 456789"
                        maxlength="30"
                    >
                </div>

                <div class="form-group">
                    <label for="email">E-Mail</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="max.mustermann@example.com"
                        maxlength="100"
                    >
                </div>
            </form>
        </div>

        <!-- Vorschau-Seite -->
        <div class="preview-box">
            <h2>Vorschau</h2>
            <span class="preview-label">Dein Namensschild (95 x 60 mm):</span>
            <canvas id="previewCanvas" width="359" height="226"></canvas>

            <!-- Export-Buttons -->
            <div class="export-buttons">
                <button type="button" class="btn-export" id="exportSinglePdfBtn">
                    📥 Als PDF speichern
                </button>
                <button type="button" class="btn-export btn-export-print" id="exportA4PdfBtn">
                    📄 Als A4 zum Drucken
                </button>
            </div>
        </div>
    </div>

    <script>
        /**
         * Namensschild Generator - Hauptsteuerung

         */

        const form = document.getElementById('nametagForm');
        const firstNameInput = document.getElementById('firstName');
        const lastNameInput = document.getElementById('lastName');
        const phoneNumberInput = document.getElementById('phoneNumber');
        const emailInput = document.getElementById('email');
        const previewCanvas = document.getElementById('previewCanvas');
        const ctx = previewCanvas.getContext('2d');

        // Canvas-Konstanten
        const CANVAS_WIDTH = previewCanvas.width;   // 359 px = 95 mm
        const CANVAS_HEIGHT = previewCanvas.height; // 226 px = 60 mm
        
        const LEFT_PADDING = 19;   // 5 mm
        const TOP_PADDING = 15;    // ~4 mm
        const LINE_SPACING = 8;
        
        // Maximale Breiten in Pixeln
        // 65 mm ≈ 246 px, 50 mm ≈ 189 px
        const MAX_NAME_WIDTH = 246;
        const MAX_INFO_WIDTH = 189;   // 50 mm
        
        // Schriftgrößen
        const INITIAL_NAME_SIZE = 40; // pt
        const INITIAL_INFO_SIZE = 24; // pt

        /**
         * State Management

         */
        let currentData = {
            firstName: '',
            lastName: '',
            phoneNumber: '',
            email: ''
        };

        /**
         * Event Listeners

         */
        firstNameInput.addEventListener('input', (e) => {
            validateInput(e.target);
            currentData.firstName = e.target.value.trim();
            autoSaveData();
            renderPreview();
        });

        lastNameInput.addEventListener('input', (e) => {
            validateInput(e.target);
            currentData.lastName = e.target.value.trim();
            autoSaveData();
            renderPreview();
        });

        phoneNumberInput.addEventListener('input', (e) => {
            currentData.phoneNumber = e.target.value.trim();
            autoSaveData();
            renderPreview();
        });

        emailInput.addEventListener('input', (e) => {
            validateEmail(e.target);
            currentData.email = e.target.value.trim();
            autoSaveData();
            renderPreview();
        });

        /**
         * Input-Validierung

         */
        function validateInput(input) {
            input.style.borderColor = input.value.trim().length > 0 ? '#9d0000' : '#b13333';
        }

        function validateEmail(input) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const isValid = input.value === '' || emailRegex.test(input.value);
            input.style.borderColor = isValid ? '#9d0000' : '#b13333';
        }

        /**
         * Auto-Save

         */
        function autoSaveData() {
            localStorage.setItem('nametagData', JSON.stringify(currentData));
        }

        /**
         * Text-Breite berechnen

         */
        function getTextWidth(text, font) {
            ctx.font = font;
            return ctx.measureText(text).width;
        }

        /**
         * Text mit maximaler Breite anpassen

         */
        function fitTextToWidth(text, maxWidth, fontSize, fontFamily = 'Arial') {
            let size = fontSize;
            let font = `bold ${size}px ${fontFamily}`;
            
            while (getTextWidth(text, font) > maxWidth && size > 8) {
                size -= 1;
                font = `bold ${size}px ${fontFamily}`;
            }
            
            return { size, font };
        }

        /**
         * Text mit Zeilenumbruch rendern

         */
        function wrapText(text, maxWidth, fontSize, fontFamily = 'Arial') {
            const font = `${fontSize}px ${fontFamily}`;
            ctx.font = font;
            
            const words = text.split(' ');
            const lines = [];
            let currentLine = '';

            for (let word of words) {
                const testLine = currentLine + (currentLine ? ' ' : '') + word;
                const metrics = ctx.measureText(testLine);
                
                if (metrics.width > maxWidth && currentLine) {
                    lines.push(currentLine);
                    currentLine = word;
                } else {
                    currentLine = testLine;
                }
            }
            
            if (currentLine) {
                lines.push(currentLine);
            }
            
            return lines;
        }

        /**
         * PLATZHALTER: ===== BACKGROUND CODE AUS background.html =====

         */
        function renderBackground() {
            ctx.save();
            ctx.transform(1.000000, 0.000000, 0.000000, 1.000000, 0.000000, -14.000000);
            
            // #Background color
            ctx.beginPath();
            ctx.fillStyle = 'rgb(157, 0, 0)';
            ctx.lineWidth = 1.333330;
            ctx.moveTo(0.000000, 14.000000);
            ctx.lineTo(359.057860, 14.000000);
            ctx.lineTo(359.057860, 240.771000);
            ctx.lineTo(0.000000, 240.771000);
            ctx.closePath();
            ctx.fill();
            
            // [... alle Logo-Pfade aus background.html ...]
            // GEKÜRZT FÜR DARSTELLUNG - Im echten Code alle Pfade einfügen
            
            // Weiße vertikale Linien
            ctx.fillStyle = 'rgb(255, 255, 255)';
            ctx.fillRect(278.812, 14, 0.589, 226.771);
            ctx.fillRect(282.647, 14, 0.589, 226.771);
            ctx.fillRect(286.483, 14, 0.589, 226.771);
            ctx.fillRect(290.318, 14, 0.589, 226.771);
            ctx.fillRect(294.153, 14, 0.589, 226.771);
            
            ctx.restore();
        }

        /**
         * Text-Layer rendern - LINKSBÜNDIG MIT NEUEN ANFORDERUNGEN

         */
        function renderTextLayer() {
            let currentY = TOP_PADDING;
            
            // ===== Vorname und Nachname Anpassung =====
            let firstNameSize = INITIAL_NAME_SIZE;
            let lastNameSize = INITIAL_NAME_SIZE;
            
            if (currentData.firstName && currentData.lastName) {
                const firstData = fitTextToWidth(currentData.firstName, MAX_NAME_WIDTH, INITIAL_NAME_SIZE);
                const lastData = fitTextToWidth(currentData.lastName, MAX_NAME_WIDTH, INITIAL_NAME_SIZE);
                
                firstNameSize = Math.min(firstData.size, lastData.size);
                lastNameSize = firstNameSize;
            } else if (currentData.firstName) {
                const firstData = fitTextToWidth(currentData.firstName, MAX_NAME_WIDTH, INITIAL_NAME_SIZE);
                firstNameSize = firstData.size;
                lastNameSize = firstData.size;
            } else if (currentData.lastName) {
                const lastData = fitTextToWidth(currentData.lastName, MAX_NAME_WIDTH, INITIAL_NAME_SIZE);
                firstNameSize = lastData.size;
                lastNameSize = lastData.size;
            }
            
            // ===== Vorname (erste Zeile) =====
            if (currentData.firstName) {
                const font = `bold ${firstNameSize}px Arial`;
                
                ctx.font = font;
                ctx.fillStyle = 'rgb(255, 255, 255)';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                
                ctx.fillText(currentData.firstName, LEFT_PADDING, currentY);
                
                currentY += firstNameSize + LINE_SPACING;
            }
            
            // ===== Nachname (zweite Zeile) =====
            if (currentData.lastName) {
                const font = `bold ${lastNameSize}px Arial`;
                
                ctx.font = font;
                ctx.fillStyle = 'rgb(255, 255, 255)';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                
                ctx.fillText(currentData.lastName, LEFT_PADDING, currentY);
                
                currentY += lastNameSize + LINE_SPACING;
            }
            
            // ===== Berechne optimale Größe für Rufnummer und E-Mail (OHNE Umbruch-Anpassung) =====
            let infoSize = INITIAL_INFO_SIZE;
            
            // Prüfe Rufnummer
            if (currentData.phoneNumber) {
                const phoneData = fitTextToWidth(currentData.phoneNumber, MAX_INFO_WIDTH, INITIAL_INFO_SIZE);
                infoSize = Math.min(infoSize, phoneData.size);
            }
            
            // Prüfe E-Mail Zeilen (geteilt durch "/")
            if (currentData.email) {
                const emailLines = currentData.email.split('/');
                let maxEmailWidth = 0;
                
                for (let line of emailLines) {
                    const emailData = fitTextToWidth(line.trim(), MAX_INFO_WIDTH, INITIAL_INFO_SIZE);
                    maxEmailWidth = Math.max(maxEmailWidth, emailData.size);
                    infoSize = Math.min(infoSize, emailData.size);
                }
            }
            
            // ===== Rufnummer =====
            if (currentData.phoneNumber) {
                ctx.font = `${infoSize}px Arial`;
                ctx.fillStyle = 'rgb(255, 255, 255)';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                
                ctx.fillText(currentData.phoneNumber, LEFT_PADDING, currentY);
                
                currentY += infoSize + LINE_SPACING;
            }
            
            // ===== E-Mail mit manuellem Zeilenumbruch (durch "/" getrennt) =====
            if (currentData.email) {
                const emailLines = currentData.email.split('/');
                
                ctx.font = `${infoSize}px Arial`;
                ctx.fillStyle = 'rgb(255, 255, 255)';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                
                for (let line of emailLines) {
                    const trimmedLine = line.trim();
                    if (trimmedLine && currentY < CANVAS_HEIGHT - TOP_PADDING) {
                        ctx.fillText(trimmedLine, LEFT_PADDING, currentY);
                        currentY += infoSize + 4;
                    }
                }
            }
        }

        /**
         * Komplette Vorschau rendern

         */
        function renderPreview() {
            // Canvas löschen
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            
            // Hintergrund zeichnen
            renderBackground();
            
            // Text überlagern
            renderTextLayer();
            
            console.log('✓ Vorschau aktualisiert');
        }

        /**
         * PDF Export Functions

        */

        /**
         * Einzelnes Namensschild als PDF exportieren

        */
        document.getElementById('exportSinglePdfBtn').addEventListener('click', () => {
            if (!currentData.firstName || !currentData.lastName) {
                alert('Bitte geben Sie mindestens Vor- und Nachname ein!');
                return;
            }

            try {
                // Canvas rendern
                renderPreview();
                
                // Hole jsPDF aus dem globalen Namespace
                const { jsPDF } = window.jspdf;
                
                // Größen in mm: Namensschild ist 95 x 60 mm
                const pdf = new jsPDF({
                    orientation: 'landscape',
                    unit: 'mm',
                    format: [95, 60]
                });
                
                // Canvas zu Bild konvertieren
                const imgData = previewCanvas.toDataURL('image/png');
                
                // Bild auf PDF einfügen (volle Größe)
                pdf.addImage(imgData, 'PNG', 0, 0, 95, 60);
                
                // Dateiname generieren
                const fileName = `${currentData.firstName}_${currentData.lastName}_Namensschild.pdf`;
                
                // PDF speichern
                pdf.save(fileName);
                
                console.log('✓ PDF einzeln exportiert:', fileName);
                alert('PDF erfolgreich heruntergeladen!');
            } catch (error) {
                console.error('Fehler beim PDF-Export:', error);
                alert('Fehler beim Exportieren. Bitte versuchen Sie es später erneut.');
            }
        });

        /**
         * Namensschild auf DIN A4 zum Drucken exportieren

        */
        document.getElementById('exportA4PdfBtn').addEventListener('click', () => {
            if (!currentData.firstName || !currentData.lastName) {
                alert('Bitte geben Sie mindestens Vor- und Nachname ein!');
                return;
            }

            try {
                // Canvas rendern
                renderPreview();
                
                // Hole jsPDF aus dem globalen Namespace
                const { jsPDF } = window.jspdf;
                
                // DIN A4 PDF erstellen (210 x 297 mm)
                const pdf = new jsPDF({
                    orientation: 'portrait',
                    unit: 'mm',
                    format: 'a4'
                });
                
                // Canvas zu Bild konvertieren
                const imgData = previewCanvas.toDataURL('image/png');
                
                // 10mm Abstand oben und links
                const posX = 10;
                const posY = 10;
                const width = 95;   // Breite Namensschild
                const height = 60;  // Höhe Namensschild
                
                // Bild auf PDF einfügen
                pdf.addImage(imgData, 'PNG', posX, posY, width, height);
                
                // Beschriftung hinzufügen (optional)
                pdf.setFontSize(10);
                pdf.setTextColor(100, 100, 100);
                pdf.text(
                    `${currentData.firstName} ${currentData.lastName}`,
                    posX,
                    posY + height + 8
                );
                
                // Dateiname generieren
                const fileName = `${currentData.firstName}_${currentData.lastName}_A4_Druck.pdf`;
                
                // PDF speichern
                pdf.save(fileName);
                
                console.log('✓ A4 PDF exportiert:', fileName);
                alert('PDF erfolgreich heruntergeladen!');
            } catch (error) {
                console.error('Fehler beim A4-Export:', error);
                alert('Fehler beim Exportieren. Bitte versuchen Sie es später erneut.');
            }
        });

        /**
         * Beim Laden initialisieren

         */
        window.addEventListener('load', () => {
            const savedData = localStorage.getItem('nametagData');
            if (savedData) {
                currentData = JSON.parse(savedData);
                firstNameInput.value = currentData.firstName;
                lastNameInput.value = currentData.lastName;
                phoneNumberInput.value = currentData.phoneNumber;
                emailInput.value = currentData.email;

                validateInput(firstNameInput);
                validateInput(lastNameInput);
                validateEmail(emailInput);
            }

            renderPreview();
            console.log('✓ Anwendung geladen');
        });
    </script>
</body>
</html>
